<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Novix Medical</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body class="dark-mode">

<!-- شاشة تسجيل الدخول -->
<div id="auth-overlay" class="overlay">
    <button id="login-btn">تسجيل الدخول بواسطة Google</button>
</div>

<!-- التطبيق (مخفي بالبداية) -->
<div class="container" style="display:none;">

    <h2>Novix AI</h2>

    <input type="file" id="fileInput">

    <!-- التحميل -->
    <div id="loading-area" style="display:none;">
        <p>جاري التحليل...</p>
        <p id="dhikr-text"></p>
    </div>

    <div id="main-content" style="display:none;">
        <div id="dynamic-tab"></div>
        <div id="terms-tab"></div>
        <div id="quiz-tab"></div>

        <!-- Chat -->
        <div class="chat-box">
            <input id="chatInput" placeholder="اسأل عن المحاضرة">
            <button onclick="askAI()">إرسال</button>
            <div id="chatOutput"></div>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
