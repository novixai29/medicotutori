<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Med Tutorial</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;800&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <h1>Med Tutorial</h1>
  <button id="darkModeToggle">🌙</button>
</header>

<section class="welcome">
السلام عليكم، هذا الموقع مجاني كصدقة جارية لأرواح اموات المسلمين جميعاً
</section>

<section class="auth">
<button id="loginBtn">تسجيل الدخول گوگل</button>
<p id="userInfo"></p>
</section>

<section class="upload">
<input type="file" id="fileInput">
<button id="uploadBtn">رفع وشرح</button>
</section>

<section id="loading" class="hidden">
<p>المسألة ما تطول، اذكر الله علما نكمل و الله يوفقك</p>
<div id="azkar"></div>
</section>

<!-- Tabs -->
<div class="tabs hidden" id="tabs">
  <button onclick="showTab('explain')">شرح</button>
  <button onclick="showTab('terms')">مصطلحات</button>
  <button onclick="showTab('mcq')">اختبار</button>
</div>

<section id="explain" class="tabContent"></section>
<section id="terms" class="tabContent hidden"></section>
<section id="mcq" class="tabContent hidden"></section>

<script src="script.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>

</body>
</html>
