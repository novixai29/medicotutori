<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med Tutorial | زميلك في الدراسة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body class="light-mode">

    <nav class="navbar">
        <div class="logo">Med Tutorial</div>
        <div class="nav-links">
            <button id="theme-toggle" class="btn-icon"><i class="fas fa-moon"></i></button>
            <button id="login-btn" class="btn-primary">تسجيل الدخول بجوجل</button>
            <div id="user-info" class="hidden">
                <span id="user-name"></span>
                <button id="logout-btn" class="btn-outline">خروج</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <p class="sadaqa-msg">السلام عليكم، هذا الموقع مجاني كصدقة جارية لأرواح اموات المسلمين جميعاً</p>
        <h1>اشرح مادتك.. كأننا كاعدين سوة</h1>
    </header>

    <main class="container">
        <section id="admin-panel" class="hidden card">
            <h3><i class="fas fa-user-shield"></i> لوحة الإدارة (خاص بالدكتور محسن)</h3>
            <div id="users-list"></div>
        </section>

        <section class="upload-section card">
            <div class="drop-zone" id="drop-zone">
                <i class="fas fa-file-medical-alt fa-3x"></i>
                <p>اسحب ملف المحاضرة هنا أو اضغط للرفع</p>
                <input type="file" id="file-input" hidden>
            </div>
            <button id="process-btn" class="btn-primary full-width">ابدأ الشرح الذكي</button>
        </section>

        <section id="loading-area" class="hidden card text-center">
            <div class="loader"></div>
            <p class="wait-msg">المسألة ما تطول، اذكر الله علما نكمل و الله يوفقك</p>
            <div id="dhikr-display" class="dhikr-style"></div>
        </section>

        <section id="result-area" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('explanation')">الشرح</button>
                <button class="tab-btn" onclick="showTab('terms')">المصطلحات</button>
                <button class="tab-btn" onclick="showTab('quizzes')">اختبارات MCQ</button>
            </div>

            <div id="explanation" class="tab-content active">
                <div id="previous-review" class="review-box"></div>
                <div id="main-explanation"></div>
            </div>
            
            <div id="terms" class="tab-content"></div>
            <div id="quizzes" class="tab-content"></div>
        </section>

        <section class="history-section card">
            <h3><i class="fas fa-history"></i> سجل محاضراتك السابقة</h3>
            <ul id="history-list"></ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
