<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طبيب المستقبل | الشرح الذكي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🩺 طبيب المستقبل</h1>
                <p class="subtitle">شرح المحاضرات الطبية بلهجتك المفضلة</p>
            </div>
            <div id="user-level" class="badge">مبتدئ</div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>المعدل العام</h3>
                <p id="avg-score">0%</p>
            </div>
            <div class="stat-card">
                <h3>الاختبارات المنتهية</h3>
                <p id="total-quizzes">0</p>
            </div>
            <div class="stat-card">
                <h3>اللغة/اللّهجة</h3>
                <p id="current-dialect">العراقية</p>
            </div>
        </section>

        <main id="main-content">
            <div id="uploader-section" class="card">
                <div class="upload-box" id="drop-zone">
                    <span class="upload-icon">📄</span>
                    <h3>ارفع محاضرة الـ PDF هنا</h3>
                    <p>سيقوم الذكاء الاصطناعي بتحليلها فوراً</p>
                    <input type="file" id="fileInput" hidden accept=".pdf">
                    <button class="btn-primary" onclick="document.getElementById('fileInput').click()">اختر الملف</button>
                </div>
            </div>

            <div id="interaction-section" class="card" style="display: none;">
                <div class="chat-container">
                    <div id="chat-messages" class="chat-messages">
                        </div>
                    <div class="input-area">
                        <input type="text" id="userQuery" placeholder="اسأل عن أي جزء في المحاضرة...">
                        <button class="btn-send" onclick="askGemini()">إرسال</button>
                    </div>
                </div>
                <button class="btn-secondary" onclick="resetUploader()" style="margin-top: 15px;">رفع ملف آخر</button>
            </div>
        </main>

        <section class="history-section card">
            <h3>📜 المحاضرات السابقة</h3>
            <ul id="lecture-list" class="lecture-list">
                <li class="empty-msg">لا يوجد محاضرات مسجلة بعد.</li>
            </ul>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
